services:
  ui:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    env_file:
      - .env
    expose:
      - "8501"
    restart: unless-stopped

  api:
    build: .
    command: uvicorn listingsfinder.api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  scheduler:
    build: .
    command: python -m listingsfinder.scheduler_service
    env_file:
      - .env
    restart: unless-stopped