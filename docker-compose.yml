services:
  ui:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false
    env_file:
      - .env
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build: .
    command: uvicorn listingsfinder.api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  scheduler:
    build: .
    command: python -m listingsfinder.scheduler_service
    env_file:
      - .env
    restart: unless-stopped