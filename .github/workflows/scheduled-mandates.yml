name: Run scheduled mandates

on:
  workflow_dispatch:
  schedule:
    # 5 AM Eastern: 10:00 UTC during EST, 09:00 UTC during EDT.
    # The app checks each mandate's Next Run, so duplicate triggers are safe.
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"

jobs:
  run-scheduled-mandates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      SEARCH_PROVIDER: ${{ secrets.SEARCH_PROVIDER }}
      SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }}
      GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_TOKEN_INFO: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduled mandates
        run: python -m listingsfinder.scheduler
